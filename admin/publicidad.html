<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />

  <title>Publicidad | Ofertas Imperdibles MX</title>

  <link rel="icon" href="../img/logo.png" />
  <link rel="stylesheet" href="publicidad.css?v=20" />
</head>

<body>
  <header class="encabezado">
    <img src="../img/logo.png" alt="Ofertas Imperdibles MX" class="logo" />
    <h1>📢 Publicidad rotativa</h1>
    <p>Administra los anuncios que aparecen al final de la página.</p>
  </header>

  <main class="contenedor">
    <section id="login-panel" class="panel login-panel">
      <h2>🔒 Acceso privado</h2>

      <label for="admin-password">Contraseña</label>
      <input
        id="admin-password"
        type="password"
        autocomplete="current-password"
        placeholder="Ingresa tu contraseña"
      />

      <button id="login-button" class="boton-principal" type="button">
        Entrar
      </button>

      <p id="login-message" class="mensaje" aria-live="polite"></p>
    </section>

    <section id="admin-panel" hidden>
      <nav class="admin-nav">
        <a href="./">🎟️ Cupones</a>
        <a class="activo" href="publicidad.html">📢 Publicidad</a>
        <button id="cerrar-sesion" type="button">Cerrar sesión</button>
      </nav>

      <section class="panel panel-formulario-compacto">
        <div class="titulo-fila">
          <h2 id="form-title">Agregar publicidad</h2>
          <button id="nueva-publicidad" class="boton-secundario" type="button">
            + Nueva
          </button>
        </div>

        <form id="publicidad-form" class="formulario-compacto">
          <input id="publicidad-id" type="hidden" />
          <input id="imagen-url" type="hidden" />

          <div class="form-grid form-grid-publicidad">
            <div class="campo campo-ad-titulo">
              <label for="titulo">Título</label>
              <input
                id="titulo"
                type="text"
                placeholder="Ej. Rotomartillo ANIRONA"
                required
              />
            </div>

            <div class="campo campo-ad-orden">
              <label for="orden">Orden</label>
              <input
                id="orden"
                type="number"
                min="0"
                value="0"
              />
            </div>

            <div class="campo campo-ad-descripcion">
              <label for="descripcion">Descripción</label>
              <textarea
                id="descripcion"
                rows="3"
                placeholder="Descripción breve del producto"
              ></textarea>
            </div>

            <div class="campo campo-ad-enlace">
              <label for="enlace">Enlace de Mercado Libre</label>
              <input
                id="enlace"
                type="url"
                placeholder="https://meli.la/..."
                required
              />
            </div>

            <div class="campo campo-ad-imagen">
              <label for="imagen">Foto del producto</label>
              <input
                id="imagen"
                type="file"
                accept="image/png,image/jpeg,image/webp"
              />

              <small>
                La imagen se optimiza antes de subir. Máximo recomendado: 5 MB.
              </small>
            </div>

            <div id="preview-wrapper" class="preview-wrapper" hidden>
              <img id="imagen-preview" src="" alt="Vista previa" />
            </div>

            <label class="switch-row campo-ad-activo">
              <input id="activo" type="checkbox" checked />
              <span>Mostrar publicidad</span>
            </label>
          </div>

          <div class="acciones">
            <button class="boton-principal" type="submit">
              Guardar publicidad
            </button>

            <button
              id="cancelar-edicion"
              class="boton-secundario"
              type="button"
              hidden
            >
              Cancelar
            </button>
          </div>

          <p id="form-message" class="mensaje" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel">
        <div class="titulo-fila">
          <h2>Publicidades registradas</h2>

          <button id="actualizar-lista" class="boton-secundario" type="button">
            ↻ Actualizar
          </button>
        </div>

        <p id="list-message" class="mensaje" aria-live="polite"></p>

        <div id="publicidades-lista" class="publicidades-lista"></div>
      </section>
    </section>
  </main>

  <script type="module" src="publicidad.js?v=20"></script>
</body>
</html>
